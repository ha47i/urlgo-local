<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>JSON 列表编辑器</title><link rel="stylesheet" href="./style.css"></head><body><div class="app"><section class="header"><div class="title-row"><div><h1>JSON 列表编辑器</h1><p class="subtitle">读取<code>values.json</code>后可直接编辑结构。支持自动保存 API Key、新建自动定位。</p></div><div class="buttons"><button class="ghost" id="reloadBtn">重新读取</button><button class="secondary" id="addBtn">添加一项</button></div></div><div class="toolbar"><div class="field small"><label for="apiKey">密钥 API Key (自动保存)</label><div class="inputbox"><input id="apiKey" type="password" placeholder="请输入Key..." autocomplete="off"><button id="clearAPI" class="ghost">✕</button></div></div><div class="field"><label for="filePath">目标文件 FilePath (路径)</label><div class="inputbox"><input id="filePath" type="text" placeholder="请输入文件路径..." value="ulrgo/values.json"><button id="clearPath" class="ghost">✕</button></div></div><div class="buttons"><button class="primary" id="uploadBtn">上传到服务器</button><button class="ghost" id="saveBtn">下载 JSON</button></div></div><div class="status" id="status">准备就绪。</div></section><main class="layout"><section class="card"><h2>卡片列表</h2><div class="list cards" id="list"></div><div class="hint">点击卡片可展开详细编辑区域。列表默认仅显示 name 与 value。</div></section><section class="card"><h2>JSON 预览</h2><pre class="json-preview" id="preview">[]</pre><div class="hint">JSON内容会实时同步到这里，便于检查最终上传内容。</div></section></main><div class="footer"><div>响应式布局、支持深色模式。</div><div>Made By IceLiuli.</div></div></div><script src="./main.js" defer></script></body></html>
